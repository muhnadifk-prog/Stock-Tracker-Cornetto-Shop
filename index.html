<style>
  :root{
    --paper:#FBFAF6; --card:#ffffff; --ink:#131418; --muted:#6B6C72; --rule:#E8E5DC;
    --profit:#0F7A3B; --warn:#B45309; --danger:#B91C1C; --primary:#1E1B4B;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; background:var(--paper); }
  body{
    font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    color:var(--ink); line-height:1.4; -webkit-font-smoothing:antialiased;
  }
  .num, input[type=number], input[type=date]{
    font-family:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
    font-variant-numeric:tabular-nums;
  }
  .display{ font-family:'Instrument Serif',Georgia,'Times New Roman',serif; letter-spacing:-.01em; }
  .wrap{ max-width:1200px; margin:0 auto; padding:0 16px; }
  @media(min-width:768px){ .wrap{ padding:0 32px; } }

  .hd{ border-bottom:1px solid var(--rule); }
  .hd-in{ display:flex; justify-content:space-between; align-items:flex-end; gap:16px; padding:20px 0; }
  .hd h1{ font-size:34px; margin:0; line-height:1; }
  @media(min-width:768px){ .hd h1{ font-size:40px; } }
  .eyebrow{ font-size:10px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); }

  .nav{ border-bottom:1px solid var(--rule); position:sticky; top:0; z-index:20;
        background:rgba(251,250,246,.95); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
  .nav-in{ display:flex; gap:2px; overflow-x:auto; }
  .tab{ padding:12px 16px; font-size:14px; white-space:nowrap; border:0; border-bottom:2px solid transparent;
        background:none; color:var(--muted); cursor:pointer; font-family:inherit; }
  .tab:hover{ color:var(--ink); }
  .tab.active{ color:var(--ink); font-weight:500; border-bottom-color:var(--primary); }

  main{ padding:24px 0; }
  .sec{ margin-bottom:32px; }
  .sec.g2{ display:grid; grid-template-columns:1fr; gap:24px; }
  @media(min-width:768px){ .sec.g2{ grid-template-columns:1fr 1fr; } }
  .sec-hd{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
  .sec-title{ font-size:11px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); display:flex; align-items:center; margin:0; font-weight:500; }
  .sec-title::before{ content:''; width:3px; height:12px; background:var(--primary); margin-right:8px; }

  .card{ border:1px solid var(--rule); background:var(--card); border-radius:6px; padding:20px; }
  .card.tight{ padding:16px; }

  .kpis{ display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; }
  .kpi{ border:1px solid var(--rule); background:var(--card); border-radius:6px; padding:16px; }
  .kpi .lab{ font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:8px; }
  .kpi .val{ font-size:clamp(1.4rem,2.8vw,2rem); line-height:1; }
  .kpi .sub{ font-size:12px; color:var(--muted); margin-top:8px; }

  .muted{ color:var(--muted); } .profit{ color:var(--profit); } .danger{ color:var(--danger); } .warn{ color:var(--warn); }
  .tr{ text-align:right; } .xs{ font-size:12px; } .sm{ font-size:13px; } .nowrap{ white-space:nowrap; } .med{ font-weight:500; }
  .truncate{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .form-grid{ display:grid; grid-template-columns:1fr; gap:12px; }
  @media(min-width:768px){ .form-grid{ grid-template-columns:repeat(4,1fr); } }
  .col2{ grid-column:span 1; } .col3{ grid-column:span 1; } .col4{ grid-column:span 1; }
  @media(min-width:768px){ .col2{ grid-column:span 2; } .col3{ grid-column:span 3; } .col4{ grid-column:span 4; } }

  label.fld{ display:block; }
  .fld > span{ font-size:12px; color:var(--muted); display:block; margin-bottom:4px; }
  input,select,textarea{ width:100%; border:1px solid var(--rule); padding:8px 12px; border-radius:6px;
    font-size:14px; background:#fff; font-family:inherit; color:var(--ink); }
  input:focus,select:focus,textarea:focus{ outline:2px solid var(--primary); outline-offset:1px; border-color:transparent; }

  .actions{ display:flex; justify-content:flex-end; gap:8px; }
  .btn{ padding:8px 20px; border-radius:6px; font-size:14px; border:1px solid transparent; cursor:pointer; font-family:inherit; }
  .btn-primary{ background:var(--primary); color:#fff; }
  .btn-primary:hover{ opacity:.9; }
  .btn-outline{ background:#fff; border-color:var(--rule); color:var(--ink); }
  .btn-outline:hover{ background:var(--paper); }
  .btn-danger{ background:var(--danger); color:#fff; }
  .btn-danger:hover{ opacity:.9; }
  .btn:focus-visible{ outline:2px solid var(--primary); outline-offset:2px; }
  .linkbtn{ background:none; border:0; padding:0; font-size:12px; text-decoration:underline; cursor:pointer; color:var(--ink); font-family:inherit; }
  .linkbtn.danger{ color:var(--danger); }
  .linkbtn.muted{ color:var(--muted); }

  .toolbar{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .toolbar input,.toolbar select{ width:auto; padding:6px 12px; font-size:13px; }
  .toolbar .search{ width:220px; max-width:60vw; }
  .chk{ display:flex; align-items:center; gap:6px; font-size:12px; }
  .chk input{ width:auto; }

  .tbl-wrap{ border:1px solid var(--rule); background:var(--card); border-radius:6px; overflow:hidden; overflow-x:auto; }
  table{ border-collapse:collapse; width:100%; }
  th{ text-align:left; font-weight:500; color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.08em;
    padding:12px 10px; border-bottom:1px solid var(--rule); background:var(--paper); white-space:nowrap; }
  td{ padding:12px 10px; border-bottom:1px solid var(--rule); font-size:13px; vertical-align:top; }
  tbody tr:last-child td{ border-bottom:0; }
  tbody tr:hover{ background:rgba(30,27,75,.025); }
  .empty{ text-align:center; color:var(--muted); padding:40px 10px; }

  .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0; }
  .chan{ display:inline-flex; align-items:center; gap:6px; font-size:12px; }
  .bar-row{ margin-bottom:12px; }
  .bar-row:last-child{ margin-bottom:0; }
  .bar-top{ display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px; align-items:center; }
  .bar-track{ height:6px; background:var(--rule); border-radius:99px; overflow:hidden; }
  .bar-fill{ height:100%; border-radius:99px; }

  .alert{ padding:12px; border-left:2px solid; font-size:13px; border-radius:0 4px 4px 0; margin-top:12px; }
  .alert.warn{ border-color:var(--warn); background:rgba(180,83,9,.05); }
  .alert.danger{ border-color:var(--danger); background:rgba(185,28,28,.05); }
  .alert.profit{ border-color:var(--profit); background:rgba(15,122,59,.05); }

  .spread{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
  .mono-color{ width:26px; height:26px; border:1px solid var(--rule); padding:0; border-radius:6px; cursor:pointer; background:none; }
  .fee-grid{ display:grid; grid-template-columns:1fr; gap:0 24px; }
  @media(min-width:768px){ .fee-grid{ grid-template-columns:1fr 1fr; } }
  .fee-row{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:10px 0; border-bottom:1px solid var(--rule); }
  .fee-row:last-child{ border-bottom:0; }
  .fee-w{ width:80px; text-align:right; }

  .danger-zone{ border:1px solid rgba(185,28,28,.3); background:rgba(185,28,28,.05); border-radius:6px; padding:20px; }
  .leadp{ font-size:13px; color:var(--muted); line-height:1.6; margin:0; }
  .note{ font-size:12px; color:var(--muted); line-height:1.6; }
  footer{ border-top:1px solid var(--rule); margin-top:48px; padding:24px 0; text-align:center; font-size:12px; color:var(--muted); }
  .modal-ov{ position:fixed; inset:0; background:rgba(19,20,24,.45); display:none; align-items:center; justify-content:center; z-index:100; padding:16px; }
  .modal-ov.show{ display:flex; }
  .modal{ background:var(--card); border:1px solid var(--rule); border-radius:10px; max-width:420px; width:100%; padding:20px; box-shadow:0 12px 44px rgba(0,0,0,.20); }
  .modal h4{ margin:0 0 8px; font-size:15px; }
  .modal p{ margin:0 0 16px; font-size:13px; color:var(--muted); line-height:1.5; white-space:pre-wrap; }
  .modal .actions{ display:flex; justify-content:flex-end; gap:8px; }
  .segbtn{ padding:5px 12px; font-size:12px; border:1px solid var(--rule); background:#fff; border-radius:99px; cursor:pointer; color:var(--muted); font-family:inherit; }
  .segbtn:hover{ color:var(--ink); }
  .segbtn.active{ background:var(--primary); color:#fff; border-color:var(--primary); }
  th[data-action]:hover{ color:var(--ink); }
  .aging-chip{ display:inline-flex; align-items:center; gap:5px; border:1px solid var(--rule); border-radius:99px; padding:4px 10px; font-size:12px; background:#fff; }
  .aging-chip.muted{ color:var(--muted); }
  .sec.g2>div{ display:flex; flex-direction:column; }
  .sec.g2 .card{ flex:1; }
  .cloud-badge{ font-size:11px; color:var(--muted); display:inline-flex; align-items:center; gap:5px; }
  .cloud-dot{ width:7px; height:7px; border-radius:50%; display:inline-block; }
  .order-tag{ display:inline-block; font-size:10px; font-weight:600; color:var(--primary); background:rgba(30,27,75,.08); border-radius:6px; padding:1px 6px; margin-left:6px; white-space:nowrap; }
  .list-summary{ font-size:12.5px; color:var(--muted); background:var(--paper); border:1px solid var(--rule); border-radius:6px; padding:8px 12px; margin-bottom:10px; line-height:1.6; }
  .combo{ position:relative; }
  .combo-input{ width:100%; }
  .combo-list{ position:absolute; left:0; right:0; top:100%; z-index:50; background:#fff; border:1px solid var(--rule); border-radius:8px; margin-top:4px; max-height:300px; overflow-y:auto; box-shadow:0 10px 28px rgba(19,20,24,.14); }
  .combo-item{ padding:9px 12px; font-size:13px; cursor:pointer; border-bottom:1px solid var(--rule); display:flex; justify-content:space-between; gap:12px; align-items:baseline; }
  .combo-item:last-child{ border-bottom:0; }
  .combo-item:hover{ background:var(--paper); }
  .combo-item.combo-manual{ color:var(--muted); }
  .combo-item > span:first-child{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pager{ display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-top:12px; }
  .pager-info{ font-size:12px; color:var(--muted); }
  .pager-controls{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .pg-btn, .pg-num{ min-width:32px; height:32px; padding:0 9px; border:1px solid var(--rule); background:#fff; border-radius:7px; font-size:13px; cursor:pointer; color:var(--ink); font-family:inherit; }
  .pg-btn:hover:not(:disabled), .pg-num:hover{ background:var(--paper); }
  .pg-num.active{ background:var(--primary); color:#fff; border-color:var(--primary); }
  .pg-btn:disabled{ opacity:.4; cursor:default; }
  .pg-dots{ padding:0 2px; color:var(--muted); }
  .pg-size{ font-size:12px; color:var(--muted); display:inline-flex; align-items:center; gap:6px; margin-left:8px; }
  .pg-size select{ width:auto; padding:6px 8px; font-size:13px; }
  .sort-mobile{ display:none; }

  @media (min-width: 768px){
    .data-wrap table{ width:100%; min-width:0 !important; }
    .data-wrap th, .data-wrap td{ padding-left:5px; padding-right:5px; }
    .data-wrap th:first-child, .data-wrap td:first-child{ padding-left:10px; }
    .data-wrap th:last-child, .data-wrap td:last-child{ padding-right:10px; }
    .data-wrap th, .data-wrap td{ font-size:12px; }
    .data-wrap .num{ font-size:11px; letter-spacing:-0.02em; }
    .data-wrap td:nth-child(2){ max-width:210px; }
    .data-wrap td:nth-child(2) > div:first-child{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  }

  @media (max-width: 767px){
    .wrap{ padding:0 14px; }
    main{ padding:16px 0; }
    .sec{ margin-bottom:22px; }

    .hd-in{ padding:14px 0; gap:10px; align-items:flex-start; }
    .hd h1{ font-size:25px; }
    .eyebrow{ font-size:9px; }

    .nav{ background:var(--paper); }
    .tab{ padding:11px 13px; font-size:13px; }

    .kpis{ grid-template-columns:1fr 1fr; gap:8px; }
    .kpi{ padding:12px; border-radius:10px; }
    .kpi .val{ font-size:1.35rem; }
    .kpi .lab{ font-size:9px; }

    .sec-hd{ gap:8px; }
    .sec-title{ font-size:10px; }

    .card{ padding:14px; border-radius:12px; }
    .card.tight{ padding:12px; }
    .form-grid{ gap:10px; }
    .actions{ gap:8px; }
    .actions .btn{ flex:1; text-align:center; }

    .toolbar{ width:100%; gap:8px; }
    .toolbar .search{ flex:1 1 100%; width:100%; max-width:none; }
    .toolbar select{ flex:1 1 46%; width:auto; padding:9px 12px; }
    .toolbar .chk{ flex:1 1 100%; }
    .sort-mobile{ display:inline-block !important; flex:1 1 100%; width:100%; }

    .list-summary{ font-size:12px; padding:9px 11px; }
    .segbtn{ padding:6px 11px; font-size:11.5px; }
    .modal{ max-width:100%; }

    /* Ubah tabel data besar menjadi kartu */
    .data-wrap{ border:0; overflow:visible; background:transparent; border-radius:0; }
    .data-wrap table{ min-width:0 !important; }
    .data-wrap thead{ display:none; }
    .data-wrap tbody, .data-wrap tr, .data-wrap td{ display:block; width:auto; }
    .data-wrap tbody tr{ display:flex; flex-direction:column; border:1px solid var(--rule); border-radius:14px; background:var(--card); margin-bottom:10px; padding:12px 15px; box-shadow:0 1px 2px rgba(19,20,24,.03); }
    .data-wrap tbody tr:hover{ background:var(--card); }
    .data-wrap td{ border:0 !important; padding:5px 0; display:flex; justify-content:space-between; gap:14px; align-items:baseline; font-size:13px; }
    .data-wrap td::before{ content:attr(data-label); color:var(--muted); font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; white-space:nowrap; flex:0 0 auto; }
    .data-wrap td:nth-child(2){ order:-2; display:block; padding:0 0 9px; margin-bottom:7px; border-bottom:1px solid var(--rule) !important; font-size:14.5px; line-height:1.35; }
    .data-wrap td:nth-child(2)::before{ display:none; }
    .data-wrap td:last-child{ order:100; display:flex; justify-content:flex-end; gap:18px; padding-top:11px; margin-top:5px; border-top:1px solid var(--rule) !important; }
    .data-wrap td:last-child::before{ display:none; }
    .data-wrap td:last-child .linkbtn{ font-size:13px; }
    .data-wrap td.empty{ display:block !important; border:0 !important; text-align:center; padding:24px 0; }
    .data-wrap td.empty::before{ display:none; }
    .data-wrap tbody tr:has(td.empty){ background:transparent; border:1px dashed var(--rule); box-shadow:none; }
  }

  ::selection{ background:var(--primary); color:#fff; }
</style>
</head>
<body>

  <footer><div class="wrap">Data tersimpan lokal di browser · Rutin backup lewat tab Import / Export</div></footer>
</div>

function getMarketplaceFee(name,mps){ var m=mps.find(function(x){return x.name===name;}); return m?m.fee:0; }
function getMarketplaceColor(name,mps){ var m=mps.find(function(x){return x.name===name;}); return m?m.color:'#9CA3AF'; }

function calculateSaleMetrics(sale,inventory,mps){
  var inv = inventory.find(function(i){return i.id===sale.inventoryId;});
  var hpp = inv ? Number(inv.costPrice) : Number(sale.costPriceSnapshot||0);
  var revenue = Number(sale.sellPrice) * Number(sale.qty);
  var cogs = hpp * Number(sale.qty);
  var feePct = getMarketplaceFee(sale.channel,mps);
  var adminFee = (sale.adminFeeOverride!=null && sale.adminFeeOverride!=='')
    ? Number(sale.adminFeeOverride) : revenue*feePct/100;
  var shipping = Number(sale.shippingCost||0);
  var grossProfit = revenue - cogs;
  var netProfit = grossProfit - adminFee - shipping;
  var margin = revenue>0 ? (netProfit/revenue)*100 : 0;
  return { revenue:revenue, cogs:cogs, adminFee:adminFee, shipping:shipping, grossProfit:grossProfit, netProfit:netProfit, margin:margin, hpp:hpp };
}

function calculateStock(inventory,sales){
  return inventory.map(function(item){
    var soldQty = sales.filter(function(s){return s.inventoryId===item.id;})
      .reduce(function(sum,s){return sum+Number(s.qty||0);},0);
    var qty = Number(item.qty||0);
    var remaining = qty - soldQty;
    var days = Math.floor((Date.now()-new Date(item.date).getTime())/86400000);
    return Object.assign({},item,{
      soldQty:soldQty, remaining:remaining,
      daysInStock: isFinite(days)?days:0,
      value: Math.max(0,remaining)*Number(item.costPrice||0)
    });
  });
}

function calculateMetrics(sales,inventory,mps){
  var now=new Date();
  var som=new Date(now.getFullYear(),now.getMonth(),1);
  var soy=new Date(now.getFullYear(),0,1);
  var ytdRevenue=0,ytdNetProfit=0,ytdAdminFee=0;
  var mtdRevenue=0,mtdNetProfit=0,mtdUnits=0;
  var byChannel={}, byProduct={};
  sales.forEach(function(sale){
    var m=calculateSaleMetrics(sale,inventory,mps);
    var d=new Date(sale.date);
    var qty=Number(sale.qty||0);
    if(d>=soy){ ytdRevenue+=m.revenue; ytdNetProfit+=m.netProfit; ytdAdminFee+=m.adminFee; }
    if(d>=som){ mtdRevenue+=m.revenue; mtdNetProfit+=m.netProfit; mtdUnits+=qty; }
    byChannel[sale.channel]=(byChannel[sale.channel]||0)+m.revenue;
    if(!byProduct[sale.productName]) byProduct[sale.productName]={qty:0,revenue:0,profit:0};
    byProduct[sale.productName].qty+=qty;
    byProduct[sale.productName].revenue+=m.revenue;
    byProduct[sale.productName].profit+=m.netProfit;
  });
  var stock=calculateStock(inventory,sales);
  var stockValue=stock.reduce(function(s,x){return s+Math.max(0,x.remaining)*Number(x.costPrice||0);},0);
  var stockUnits=stock.reduce(function(s,x){return s+Math.max(0,x.remaining);},0);
  return {
    ytdRevenue:ytdRevenue, ytdNetProfit:ytdNetProfit, ytdAdminFee:ytdAdminFee,
    mtdRevenue:mtdRevenue, mtdNetProfit:mtdNetProfit, mtdUnits:mtdUnits,
    byChannel:byChannel, byProduct:byProduct,
    stockValue:stockValue, stockUnits:stockUnits,
    ytdMargin: ytdRevenue>0?(ytdNetProfit/ytdRevenue)*100:0,
    mtdMargin: mtdRevenue>0?(mtdNetProfit/mtdRevenue)*100:0
  };
}

function applySort(rows,st,getVal){
  var dir = st.dir==='asc'?1:-1;
  return rows.slice().sort(function(a,b){
    var va=getVal(a,st.key), vb=getVal(b,st.key);
    if(typeof va==='number' && typeof vb==='number') return (va-vb)*dir;
    return String(va).localeCompare(String(vb),'id')*dir;
  });
}

function compactNum(v){
  var a=Math.abs(v);
  if(a>=1e9) return (v/1e9).toFixed(a>=1e10?0:1)+'M';
  if(a>=1e6) return (v/1e6).toFixed(a>=1e7?0:1)+'jt';
  if(a>=1e3) return Math.round(v/1e3)+'rb';
  return String(Math.round(v));
}
function buildChartData(metric,group){
  var now=new Date(); var buckets=[];
  if(group==='harian'){
    for(var i=13;i>=0;i--){ var dt=new Date(now.getFullYear(),now.getMonth(),now.getDate()-i);
      buckets.push({label:dt.getDate()+'/'+(dt.getMonth()+1), from:new Date(dt.getFullYear(),dt.getMonth(),dt.getDate()), to:new Date(dt.getFullYear(),dt.getMonth(),dt.getDate()+1)}); }
  } else if(group==='mingguan'){
    var base=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    var dow=(base.getDay()+6)%7; base.setDate(base.getDate()-dow);
    for(var w=11;w>=0;w--){ var fr=new Date(base.getFullYear(),base.getMonth(),base.getDate()-w*7); var to=new Date(fr.getFullYear(),fr.getMonth(),fr.getDate()+7);
      buckets.push({label:fr.getDate()+'/'+(fr.getMonth()+1), from:fr, to:to}); }
  } else if(group==='bulanan'){
    for(var mo=11;mo>=0;mo--){ var f=new Date(now.getFullYear(),now.getMonth()-mo,1); var t=new Date(f.getFullYear(),f.getMonth()+1,1);
      buckets.push({label:f.toLocaleDateString('id-ID',{month:'short'})+' '+String(f.getFullYear()).slice(2), from:f, to:t}); }
  } else if(group==='tahunan'){
    var ys=state.sales.map(function(s){return new Date(s.date).getFullYear();}).filter(function(y){return y;});
    var minY=ys.length?Math.min.apply(null,ys):now.getFullYear();
    if(minY>now.getFullYear()) minY=now.getFullYear();
    for(var y=minY;y<=now.getFullYear();y++){ buckets.push({label:String(y), from:new Date(y,0,1), to:new Date(y+1,0,1)}); }
  } else {
    for(var mm=0;mm<=now.getMonth();mm++){ var ff=new Date(now.getFullYear(),mm,1); var tt=new Date(now.getFullYear(),mm+1,1);
      buckets.push({label:ff.toLocaleDateString('id-ID',{month:'short'}), from:ff, to:tt}); }
  }
  buckets.forEach(function(b){ b.val=0; });
  state.sales.forEach(function(s){
    var t=new Date(s.date).getTime(); if(!t) return;
    var m=calculateSaleMetrics(s,state.inventory,state.marketplaces);
    var v = metric==='omset'? m.revenue : metric==='laba'? m.netProfit : (Number(s.qty)||0);
    for(var bi=0;bi<buckets.length;bi++){ if(t>=buckets[bi].from.getTime() && t<buckets[bi].to.getTime()){ buckets[bi].val+=v; break; } }
  });
  return buckets;
}
function buildChartSvg(metric,group){
  var data=buildChartData(metric,group);
  var color = metric==='omset'? '#1E1B4B' : metric==='laba'? '#0F7A3B' : '#B45309';
  var n=data.length, bw=Math.max(46,Math.min(120,Math.floor(1080/Math.max(n,1)))), padL=10, padR=10, padT=18, padB=28, H=210;
  var W=Math.max(320, padL+padR+n*bw);
  var vals=data.map(function(b){return b.val;});
  var maxV=Math.max.apply(null,vals.concat([0]));
  var minV=Math.min.apply(null,vals.concat([0]));
  if(maxV===0 && minV===0) maxV=1;
  var range=(maxV-minV)||1, plotH=H-padT-padB;
  function y(v){ return padT + plotH*(maxV-v)/range; }
  var zeroY=y(0), isUnit=metric==='unit';
  var bars=data.map(function(b,idx){
    var cx=padL+idx*bw, x=cx+bw*0.18, w=bw*0.64, yv=y(b.val);
    var top=Math.min(yv,zeroY), h=Math.max(1,Math.abs(zeroY-yv));
    var lbl = b.val!==0 ? (isUnit?String(Math.round(b.val)):compactNum(b.val)) : '';
    var labelY = b.val>=0 ? top-4 : top+h+10;
    var valTxt = isUnit ? (Math.round(b.val)+' unit') : formatRupiah(b.val);
    return '<g><title>'+esc(b.label+': '+valTxt)+'</title>'
      + '<rect x="'+x.toFixed(1)+'" y="'+top.toFixed(1)+'" width="'+w.toFixed(1)+'" height="'+h.toFixed(1)+'" rx="2" fill="'+color+'" opacity="0.9"></rect>'
      + (lbl?'<text x="'+(cx+bw/2).toFixed(1)+'" y="'+labelY.toFixed(1)+'" text-anchor="middle" font-size="8.5" fill="#6B6C72" font-family="JetBrains Mono,monospace">'+lbl+'</text>':'')
      + '<text x="'+(cx+bw/2).toFixed(1)+'" y="'+(H-10)+'" text-anchor="middle" font-size="9" fill="#6B6C72">'+esc(b.label)+'</text></g>';
  }).join('');
  var zeroLine = (minV<0) ? '<line x1="'+padL+'" y1="'+zeroY.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+zeroY.toFixed(1)+'" stroke="#E8E5DC" stroke-width="1"></line>' : '';
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;min-width:'+Math.min(W,640)+'px;max-width:'+Math.round(W*1.7)+'px;height:auto;display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">'
    + '<line x1="'+padL+'" y1="'+(H-padB)+'" x2="'+(W-padR)+'" y2="'+(H-padB)+'" stroke="#E8E5DC" stroke-width="1"></line>'
    + zeroLine + bars + '</svg>';
}

function salesPagedSales(){

  if(salesPage>pages) salesPage=pages; if(salesPage<1) salesPage=1;
  var start=(salesPage-1)*salesPageSize;
  return { rows:rows, page:rows.slice(start,start+salesPageSize), total:total, pages:pages, start:start };
}

  var d=salesPagedSales(); if(d.total===0) return '';

function taxView(){
  var year=taxYear;
  var yearSales=state.sales.filter(function(s){return new Date(s.date).getFullYear()===year;});
  var yearRevenue=yearSales.reduce(function(sum,s){return sum+calculateSaleMetrics(s,state.inventory,state.marketplaces).revenue;},0);
  var months=[];
  for(var i=0;i<12;i++){
    var ms=yearSales.filter(function(s){return new Date(s.date).getMonth()===i;});
    var rev=0, chMap={};
    ms.forEach(function(s){
      var mm=calculateSaleMetrics(s,state.inventory,state.marketplaces);
      rev+=mm.revenue;
      if(!chMap[s.channel]) chMap[s.channel]={omset:0,unit:0};
      chMap[s.channel].omset+=mm.revenue; chMap[s.channel].unit+=Number(s.qty)||0;
    });
    months.push({ i:i, rev:rev, pph:rev*PPH_FINAL_RATE, ppn:rev*PPN_RATE/(1+PPN_RATE), channels:chMap, list:ms });
  }
  var yPph=yearRevenue*PPH_FINAL_RATE, yPpn=yearRevenue*PPN_RATE/(1+PPN_RATE);
  var over=yearRevenue>UMKM_THRESHOLD, near=yearRevenue>UMKM_THRESHOLD*0.8;
  var showPpn=state.settings.isPkp;
  var yearNet=yearSales.reduce(function(sum,s){return sum+calculateSaleMetrics(s,state.inventory,state.marketplaces).netProfit;},0);
  var taxTotal=yPph+(showPpn?yPpn:0);
  var labaSesudah=yearNet-taxTotal;

  var yearOpts='';
  for(var k=0;k<5;k++){ var y=new Date().getFullYear()-k; yearOpts+='<option value="'+y+'" '+(y===year?'selected':'')+'>'+y+'</option>'; }

  var monthRows=months.map(function(m){
    var chArr=Object.keys(m.channels).map(function(c){return {name:c,omset:m.channels[c].omset,unit:m.channels[c].unit};})
      .sort(function(a,b){return b.omset-a.omset;});
    var openM=!!taxExpanded[m.i];
    var detail;
    if(chArr.length){
      var summary = chArr.map(function(c){
        return '<div class="spread" style="padding:3px 0"><span class="chan">'+channelIcon(c.name,15)+' '+esc(c.name)+' \u00b7 '+c.unit+' unit</span><span class="num xs med">'+formatRupiah(c.omset)+'</span></div>';
      }).join('');
      var txRows = applySort(m.list, taxDetailSort, saleSortVal).map(function(s){
        var mm=calculateSaleMetrics(s,state.inventory,state.marketplaces);
        return '<tr><td class="num xs nowrap">'+formatDate(s.date)+'</td>'
          + '<td class="xs">'+esc(s.productName)+orderTag(s)+'</td>'
          + '<td><span class="chan">'+channelIcon(s.channel,13)+' <span class="xs">'+esc(s.channel)+'</span></span></td>'
          + '<td class="num tr xs">'+s.qty+'</td>'
          + '<td class="num tr xs nowrap">'+formatRupiah(mm.revenue)+'</td>'
          + '<td class="num tr xs nowrap '+(mm.netProfit>=0?'profit':'danger')+'">'+formatRupiah(mm.netProfit)+'</td>'
          + '<td class="xs nowrap">'+(saleShownInvoice(s)?'<button class="linkbtn" data-action="view-invoice" data-kind="sale" data-id="'+s.id+'">unduh</button>':'—')+'</td></tr>';
      }).join('');
      detail = '<div style="margin-bottom:10px">'+summary+'</div>'
        + '<div class="tbl-wrap" style="border:1px solid var(--rule)"><table style="min-width:600px"><thead><tr>'
        + sortTh('Tgl','date',taxDetailSort,'tax-sort')
        + sortTh('Produk','productName',taxDetailSort,'tax-sort')
        + sortTh('Channel','channel',taxDetailSort,'tax-sort')
        + sortTh('Qty','qty',taxDetailSort,'tax-sort','tr')
        + sortTh('Omset','revenue',taxDetailSort,'tax-sort','tr')
        + sortTh('Laba','netProfit',taxDetailSort,'tax-sort','tr')
        + '<th>Invoice</th>'
        + '</tr></thead><tbody>'+txRows+'</tbody></table></div>';
    } else {
      detail='<div class="note">Tidak ada penjualan di bulan ini.</div>';
    }
    var mName=new Date(year,m.i,1).toLocaleDateString('id-ID',{month:'long'});
    return '<tr data-action="tax-month" data-m="'+m.i+'" style="cursor:pointer">'
      + '<td><span id="taxcar-'+m.i+'" class="muted">'+(openM?'\u25BE':'\u25B8')+'</span> '+mName+(chArr.length?' <span class="xs muted">('+chArr.length+' channel)</span>':'')+'</td>'
      + '<td class="num tr">'+formatRupiah(m.rev)+'</td>'
      + '<td class="num tr">'+formatRupiah(m.pph)+'</td>'
      + (showPpn?'<td class="num tr muted">'+formatRupiah(m.ppn)+'</td>':'')+'</tr>'
      + '<tr class="tax-detail" id="taxd-'+m.i+'" style="display:'+(openM?'table-row':'none')+'"><td colspan="'+(showPpn?4:3)+'" style="background:var(--paper)"><div style="padding:2px 0 6px">'+detail+'</div></td></tr>';
  }).join('');

  var alertHtml='';
  if(over) alertHtml='<div class="alert danger"><strong>Omset melebihi Rp 4,8 M.</strong> Wajib dikukuhkan sebagai PKP dan memungut PPN 12%. Tarif PPh Final 0.5% tidak lagi berlaku — beralih ke skema PPh umum.</div>';
  else if(near) alertHtml='<div class="alert warn"><strong>Mendekati ambang PKP</strong> ('+(yearRevenue/UMKM_THRESHOLD*100).toFixed(0)+'% dari Rp 4,8 M). Siapkan strategi &amp; catat PPN masukan dari sekarang.</div>';

  return '<div class="sec"><div class="sec-hd"><h2 class="sec-title">Estimasi Pajak</h2></div>'
    + '<div class="card">'
    +   '<div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:12px;margin-bottom:20px">'
    +     '<div class="toolbar"><label class="sm">Tahun pajak</label><select data-live="tax-year">'+yearOpts+'</select></div>'
    +     '<label class="chk sm"><input type="checkbox" data-live="tax-pkp" '+(state.settings.isPkp?'checked':'')+'> Sudah dikukuhkan PKP</label>'
    +   '</div>'
    +   '<div class="kpis" style="margin-bottom:20px">'
    +     kpi('Omset '+year,formatRupiah(yearRevenue),(yearRevenue/UMKM_THRESHOLD*100).toFixed(1)+'% dari ambang PKP')
    +     kpi('Laba sebelum pajak',formatRupiah(yearNet),'Total laba bersih '+year,yearNet>=0?'profit':'danger')
    +     kpi('PPh Final 0.5%',formatRupiah(yPph),over?'Sudah melebihi ambang UMKM':'Tarif PP 55/2022',over?'danger':near?'warn':'profit')
    +     (showPpn?kpi('PPN 12%',formatRupiah(yPpn),'PPN keluaran (gross-up dari omset)'):'')
    +     kpi('Laba setelah pajak',formatRupiah(labaSesudah),showPpn?'Dikurangi PPh Final + PPN':'Dikurangi PPh Final',labaSesudah>=0?'profit':'danger')
    +   '</div>'
    +   alertHtml
    +   '<h3 class="sec-title" style="margin:16px 0 8px">Rincian per Bulan <span class="xs muted" style="text-transform:none;letter-spacing:0">— klik bulan untuk lihat channel</span></h3>'
    +   '<div class="tbl-wrap" style="border:0"><table><thead><tr>'

function csvEscape(v){ v=v==null?'':String(v); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; }
function toCsv(rows){
  if(!rows.length) return '';
  var h=Object.keys(rows[0]);
  return h.join(',')+'\n'+rows.map(function(r){ return h.map(function(k){return csvEscape(r[k]);}).join(','); }).join('\n');
}
function downloadBlob(name,content,mime){
  var b=new Blob([content],{type:mime||'text/plain'});
  var u=URL.createObjectURL(b);
  var a=document.createElement('a');
  a.href=u; a.download=name; document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(u);
}

function exportBackup(){

function importBackup(e){
  var file=e.target.files&&e.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var d;
    try{ d=JSON.parse(ev.target.result); }
    catch(err){ bkStatus(false,'Gagal membaca file: bukan file backup .json yang valid.'); e.target.value=''; return; }
    if(!d || !Array.isArray(d.inventory) || !Array.isArray(d.sales)){ bkStatus(false,'File tidak dikenali. Gunakan file hasil tombol "Backup Lengkap".'); e.target.value=''; return; }
    uiConfirm('Pulihkan data dari backup ini? Semua data di perangkat ini akan DIGANTI dengan isi backup ('+d.inventory.length+' barang, '+d.sales.length+' penjualan).', function(){
      state.inventory=d.inventory||[];
      state.sales=d.sales||[];
      if(Array.isArray(d.marketplaces)) state.marketplaces=d.marketplaces;
      if(Array.isArray(d.categories)) state.categories=d.categories;
      if(Array.isArray(d.warranties)) state.warranties=d.warranties;
      if(Array.isArray(d.conditions)) state.conditions=d.conditions;
      if(d.settings) state.settings=d.settings;
      save('stock_seed_stockbarang-import-2', true);
      save('stock_cleanup_nonhp_1', true);
      save('stock_merge_setor_1', true);
      __saveErr=null; persist();
      render();
      if(__saveErr && !cloudMode){ uiAlert('Data dipulihkan, tapi penyimpanan browser penuh — sebagian gambar invoice mungkin tidak tersimpan. Kurangi jumlah/ukuran invoice, atau pakai sinkronisasi cloud (tanya aku caranya).'); }
      else { bkStatus(true,'Data berhasil dipulihkan dari backup.'); }
    }, {okText:'Pulihkan'});
    e.target.value='';
  };
  reader.readAsText(file);
}

function downloadTemplate(fname, sheetName, rows, cols){

function parseDateCell(v){
  if(!v) return todayISO();
  if(v instanceof Date) return v.toISOString().slice(0,10);
  var s=String(v);
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  var d=new Date(s);
  if(!isNaN(d)) return d.toISOString().slice(0,10);
  return todayISO();
}
function importFile(e){
  var file = e.target.files && e.target.files[0];
  if(!file) return;
  if(typeof XLSX==='undefined'){ ioStatusMsg(false,'Butuh koneksi internet untuk membaca file. Coba lagi saat online.'); e.target.value=''; return; }
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var wb=XLSX.read(ev.target.result,{type:'array',cellDates:true});
      var addedInv=0, addedSales=0;
      wb.SheetNames.forEach(function(sn){
        var rows=XLSX.utils.sheet_to_json(wb.Sheets[sn]);
        if(!rows.length) return;
        var keys=Object.keys(rows[0]);
        var isSales = keys.indexOf('Harga Jual')>-1 || keys.indexOf('Channel')>-1 || keys.indexOf('Tanggal Keluar')>-1;
        var isInv = !isSales && (keys.indexOf('HPP')>-1 || keys.indexOf('Tanggal Masuk')>-1 || keys.indexOf('Kondisi')>-1);
        if(isSales){
          rows.forEach(function(r){
            if(!r['Nama Produk']) return;
            var ov = (r['Admin Override']!==undefined && r['Admin Override']!=='') ? r['Admin Override']
              : ((r['Biaya Admin']!==undefined && r['Biaya Admin']!=='') ? r['Biaya Admin'] : null);
            state.sales.unshift({
              id: r.ID || uid(),
              date: parseDateCell(r['Tanggal Keluar']),
              inventoryId: r['Inventory ID'] || '',
              productName: String(r['Nama Produk']),
              channel: r.Channel || 'Shopee',
              sellPrice: Number(r['Harga Jual']||0),
              qty: Number(r.Qty||1),
              adminFeeOverride: ov!==null ? Number(ov) : null,
              shippingCost: Number(r.Ongkir||0),
              buyer: r.Buyer || '',
              notes: r.Catatan || ''
            });
            addedSales++;
          });
        } else if(isInv){
          rows.forEach(function(r){
            if(!r['Nama Produk']) return;
            state.inventory.unshift({
              id: r.ID || uid(),
              date: parseDateCell(r['Tanggal Masuk']),
              productName: String(r['Nama Produk']),
              category: r.Kategori || 'Handphone',
              imei: r.IMEI ? String(r.IMEI) : '',
              supplier: r.Supplier || '',
              costPrice: Number(r.HPP||0),
              qty: Number(r.Qty||1),
              condition: r.Kondisi || 'New / BNIB',
              warranty: r.Garansi || '',
              notes: r.Catatan || ''
            });
            addedInv++;
          });
        }
      });
      if(addedInv===0 && addedSales===0){
        ioStatusMsg(false,'Tidak ada data terbaca. Pastikan kolom sesuai template (Barang Masuk / Penjualan).');
      } else {
        persist(); render();
        ioStatusMsg(true,'Import selesai: '+addedInv+' barang masuk, '+addedSales+' penjualan.');
      }
    }catch(err){
      ioStatusMsg(false,'Gagal import: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value='';
}

function render(){
  renderHeader();
  document.getElementById('nav').innerHTML = navHtml();
  var main=document.getElementById('main');
  var v=state.view;
  main.innerHTML =
    v==='dashboard' ? dashboardView() :
    v==='inventory' ? inventoryView() :
    v==='sales'     ? salesView() :

function submitInv(){
  var productName=val('invProduct'), cost=val('invCost');
  if(!productName || cost==='') return;
  var prev = editingInvId ? state.inventory.find(function(i){return i.id===editingInvId;}) : null;
  var invoice = (invInvoicePending!==undefined) ? invInvoicePending : (prev?(prev.invoice||null):null);
  var item={ date:val('invDate'), productName:productName, category:val('invCategory'), imei:val('invImei'),
    supplier:val('invSupplier'), costPrice:Number(cost), qty:Number(val('invQty'))||1,
    condition:val('invCondition'), warranty:val('invWarranty'), invoice:invoice, notes:(prev?(prev.notes||''):'') };
  if(editingInvId){
    state.inventory=state.inventory.map(function(i){ return i.id===editingInvId ? Object.assign({},item,{id:editingInvId}) : i; });
    editingInvId=null;
  } else {
    state.inventory.unshift(Object.assign({},item,{id:uid()}));
    for(var k=2;k<=invBulkCount;k++){
      var nm=val('invProduct'+k), cs=val('invCost'+k);
      if(!nm || cs==='') continue;
      state.inventory.unshift({ id:uid(), date:item.date, productName:nm, category:item.category, imei:val('invImei'+k),
        supplier:item.supplier, costPrice:Number(cs), qty:Number(val('invQty'+k))||1,
        condition:item.condition, warranty:item.warranty, invoice:null, notes:'' });
    }
    invBulkCount=1;
  }
  invInvoicePending=undefined; invPage=1;
  __saveErr=null; persist();
  if(__saveErr && !cloudMode){ uiAlert('Penyimpanan browser penuh. Data / invoice terbaru mungkin tidak tersimpan. Kurangi ukuran file invoice, atau ekspor lalu bersihkan data lama.'); }
  render();
}

function submitSale(){
  var productName=val('saleProduct'), price=val('salePrice');
  if(!productName || price==='' || !val('saleQty')) return;
  var adminRaw=val('saleAdmin');
  var pick=document.getElementById('saleInvPick');
  var prev = editingSaleId ? state.sales.find(function(s){return s.id===editingSaleId;}) : null;
  var invoice = (saleInvoicePending!==undefined) ? saleInvoicePending : (prev?(prev.invoice||null):null);
  var item={ date:val('saleDate'), inventoryId:(pick?pick.value:''), productName:productName, channel:val('saleChannel'),
    sellPrice:Number(price), qty:Number(val('saleQty'))||1,
    adminFeeOverride: adminRaw==='' ? null : Number(adminRaw),
    shippingCost:Number(val('saleShip')||0), buyer:val('saleBuyer'), invoice:invoice, notes:(prev?(prev.notes||''):'') };
  if(editingSaleId){
    state.sales=state.sales.map(function(s){ return s.id===editingSaleId ? Object.assign({},item,{id:editingSaleId}) : s; });
    editingSaleId=null;
  } else {
    var lines=[ Object.assign({},item,{id:uid()}) ];
    for(var k=2;k<=saleBulkCount;k++){
      var nm=val('saleProduct'+k), pr=val('salePrice'+k);
      if(!nm || pr==='') continue;
      var pk=document.getElementById('saleInvPick'+k);
      lines.push({ id:uid(), date:item.date, inventoryId:(pk?pk.value:''), productName:nm, channel:item.channel,
        sellPrice:Number(pr), qty:Number(val('saleQty'+k))||1, adminFeeOverride:null, shippingCost:0,
        buyer:item.buyer, invoice:null, notes:'' });
    }
    if(lines.length>1){ var oid=uid(); lines.forEach(function(L){ L.orderId=oid; }); }
    for(var li=lines.length-1; li>=0; li--){ state.sales.unshift(lines[li]); }
    saleBulkCount=1;
  }
  saleInvoicePending=undefined; salesPage=1;
  __saveErr=null; persist();
  if(__saveErr && !cloudMode){ uiAlert('Penyimpanan browser penuh. Data / invoice terbaru mungkin tidak tersimpan. Kurangi ukuran file invoice, atau ekspor lalu bersihkan data lama.'); }
  render();
}

function addChannel(){
  uiPrompt('Nama channel baru?','',function(name){
    if(!name || !name.trim()) return;
    name=name.trim();
    if(state.marketplaces.some(function(m){return m.name===name;})){ uiAlert('Channel dengan nama itu sudah ada.'); return; }
    state.marketplaces.push({ name:name, fee:0, color:'#4B5563' });
    persist(); render();
  });
}
function removeChannel(name){
  uiConfirm('Hapus channel "'+name+'"? Transaksi lama tetap tersimpan.',function(){
    state.marketplaces=state.marketplaces.filter(function(m){return m.name!==name;});

  },{danger:true, okText:'Hapus'});
}

function onClick(e){
  var t=e.target.closest('[data-action]'); if(!t) return;
  var a=t.getAttribute('data-action');
  var id=t.getAttribute('data-id');
  var name=t.getAttribute('data-name');
  switch(a){
    case 'nav': state.view=t.getAttribute('data-view'); render(); window.scrollTo(0,0); break;
    case 'inv-edit': editingInvId=id; invBulkCount=1; render(); window.scrollTo({top:0,behavior:'smooth'}); break;
    case 'inv-cancel': editingInvId=null; render(); break;
    case 'inv-del':
      uiConfirm('Hapus barang ini? Transaksi penjualan terkait akan kehilangan referensi HPP.',function(){
        state.inventory=state.inventory.filter(function(i){return i.id!==id;});
        if(editingInvId===id) editingInvId=null;
        persist(); render();
      },{danger:true, okText:'Hapus'});
      break;
    case 'sale-edit': editingSaleId=id; saleBulkCount=1; render(); window.scrollTo({top:0,behavior:'smooth'}); break;
    case 'sale-cancel': editingSaleId=null; render(); break;
    case 'sale-del':
      uiConfirm('Hapus transaksi ini?',function(){
        state.sales=state.sales.filter(function(s){return s.id!==id;});
        if(editingSaleId===id) editingSaleId=null;
        persist(); render();
      },{danger:true, okText:'Hapus'});
      break;
    case 'export-xlsx': exportXlsx(); break;
    case 'export-csv-inv': exportCsvInv(); break;
    case 'export-csv-sales': exportCsvSales(); break;
    case 'export-backup': exportBackup(); break;
    case 'tmpl-inv': templateInv(); break;
    case 'tmpl-sales': templateSales(); break;
    case 'clear-all':
      uiConfirm('HAPUS SEMUA DATA (barang + penjualan)? Tidak bisa dibatalkan.',function(){
        state.inventory=[]; state.sales=[]; persist(); render();
        ioStatusMsg(true,'Semua data telah dihapus.');
      },{danger:true, okText:'Hapus Semua'});
      break;
    case 'add-channel': addChannel(); break;
    case 'remove-channel': removeChannel(name); break;
    case 'reset-channels':
      uiConfirm('Reset semua channel ke default (Shopee, Tokopedia, dll)?',function(){
        state.marketplaces=JSON.parse(JSON.stringify(DEFAULT_MARKETPLACES)); persist(); render();
      });
      break;
    case 'inv-sort': {
      var sk=t.getAttribute('data-key');
      if(invSort.key===sk) invSort.dir=invSort.dir==='asc'?'desc':'asc';
      else { invSort.key=sk; invSort.dir=(sk==='productName'||sk==='category')?'asc':'desc'; }
      invPage=1; render(); break;
    }
    case 'inv-page': invPage=Number(t.getAttribute('data-page'))||1; updateInvTable(); break;
    case 'sale-sort': {
      var sk2=t.getAttribute('data-key');
      if(salesSort.key===sk2) salesSort.dir=salesSort.dir==='asc'?'desc':'asc';
      else { salesSort.key=sk2; salesSort.dir=(sk2==='productName'||sk2==='channel')?'asc':'desc'; }
      salesPage=1; render(); break;
    }
    case 'sale-page': salesPage=Number(t.getAttribute('data-page'))||1; updateSalesTable(); break;
    case 'chart-metric': chartMetric=t.getAttribute('data-val'); render(); break;
    case 'chart-group': chartGroup=t.getAttribute('data-val'); render(); break;
    case 'inv-bulk': {
      invBulkCount=Number(t.getAttribute('data-val'))||1;
      var c1=document.getElementById('invExtraItems'); if(c1) c1.innerHTML=invExtraItemsHtml();
      var b1=document.getElementById('invBulkBtns'); if(b1) b1.innerHTML=bulkBtnsInner('inv-bulk',invBulkCount,3);
      break;
    }
    case 'sale-bulk': {
      saleBulkCount=Number(t.getAttribute('data-val'))||1;
      var c2=document.getElementById('saleExtraItems'); if(c2) c2.innerHTML=saleExtraItemsHtml();
      var b2=document.getElementById('saleBulkBtns'); if(b2) b2.innerHTML=bulkBtnsInner('sale-bulk',saleBulkCount,6);
      break;
    }
    case 'add-category': addCategory(); break;
    case 'remove-category': removeCategory(name); break;
    case 'reset-categories': uiConfirm('Reset kategori ke default?',function(){ state.categories=CATEGORIES.slice(); persist(); render(); }); break;
    case 'add-warranty': addWarranty(); break;
    case 'remove-warranty': removeWarranty(name); break;
    case 'reset-warranties': uiConfirm('Reset opsi garansi ke default?',function(){ state.warranties=DEFAULT_WARRANTIES.slice(); persist(); render(); }); break;
    case 'add-condition': addCondition(); break;
    case 'remove-condition': removeCondition(name); break;
    case 'reset-conditions': uiConfirm('Reset kondisi ke default?',function(){ state.conditions=DEFAULT_CONDITIONS.slice(); persist(); render(); }); break;
    case 'sb-save-config': {
      var u=normalizeSbUrl(val('sbUrl')); var k=(val('sbKey')||'').trim();
      if(!u || !k){ renderConfigScreen('URL dan anon key wajib diisi.'); break; }
      if(u.indexOf('.supabase.co')===-1){ renderConfigScreen('Project URL sepertinya salah. Harus berbentuk https://xxxx.supabase.co — ambil dari Supabase: Project Settings \u2192 API \u2192 Project URL (bukan alamat halaman dashboard).'); break; }
      try{ localStorage.setItem('sb_url',u); localStorage.setItem('sb_key',k); localStorage.removeItem('sb_skip'); }catch(e){}
      sb=null; boot(); break;
    }
    case 'sb-skip-local': setSbSkip(true); cloudMode=false; render(); break;
    case 'sb-enable': setSbSkip(false); boot(); break;
    case 'sb-reconfigure': renderConfigScreen(); break;
    case 'sb-toggle-sql': { var q=document.getElementById('sbSql'); if(q) q.style.display=(q.style.display==='none'?'block':'none'); break; }
    case 'sb-signin': {
      var em=val('sbEmail'), pw=val('sbPw');
      if(!em||!pw){ renderLoginScreen('Email & password wajib diisi.'); break; }
      renderLoadingScreen('Masuk…');
      sbSignIn(em,pw).then(function(res){ if(res.error){ renderLoginScreen(authErrHint(res.error.message)); return; } enterCloud(); })
        .catch(function(e){ renderLoginScreen(authErrHint((e&&e.message)||'Gagal masuk.')); });
      break;
    }
    case 'sb-signup': {
      var em2=val('sbEmail'), pw2=val('sbPw');
      if(!em2||!pw2){ renderLoginScreen('Email & password wajib diisi.'); break; }
      if(pw2.length<6){ renderLoginScreen('Password minimal 6 karakter.'); break; }
      renderLoadingScreen('Mendaftar…');
      sbSignUp(em2,pw2).then(function(res){
        if(res.error){ renderLoginScreen(authErrHint(res.error.message)); return; }
        if(res.data && res.data.session){ enterCloud(); }
        else { renderLoginScreen(null,'Akun dibuat. Cek email untuk konfirmasi bila diminta, lalu Masuk. (Bisa matikan konfirmasi email di Supabase → Authentication → Providers → Email.)'); }
      }).catch(function(e){ renderLoginScreen(authErrHint((e&&e.message)||'Gagal daftar.')); });
      break;
    }
    case 'sb-sync': cloudSyncNow(); break;
    case 'sb-signout': cloudSignOut(); break;
    case 'sb-retry': enterCloud(); break;
    case 'inv-invoice-remove': { invInvoicePending=null; var st_i=document.getElementById('invInvoiceStatus'); if(st_i) st_i.textContent='(invoice akan dihapus saat simpan)'; break; }
    case 'sale-invoice-remove': { saleInvoicePending=null; var st_s=document.getElementById('saleInvoiceStatus'); if(st_s) st_s.textContent='(invoice akan dihapus saat simpan)'; break; }
    case 'combo-pick': {
      var cidx=t.getAttribute('data-idx')||''; var cid=t.getAttribute('data-id')||''; var clabel=t.getAttribute('data-label')||'';
      var hidden=document.getElementById('saleInvPick'+cidx);
      var searchInput=document.querySelector('.combo-input[data-idx="'+cidx+'"]');
      var list=document.getElementById('comboList'+cidx);
      var pn=document.getElementById(cidx===''?'saleProduct':'saleProduct'+cidx);
      if(cid){
        if(hidden) hidden.value=cid;
        if(searchInput) searchInput.value=clabel;
        var inv=state.inventory.find(function(x){return x.id===cid;});
        if(pn && inv) pn.value=inv.productName;
      } else {
        if(hidden) hidden.value='';
        if(searchInput) searchInput.value='';
      }
      if(list) list.style.display='none';
      break;
    }
    case 'view-invoice': {
      var vk=t.getAttribute('data-kind'), vid=t.getAttribute('data-id');
      var arr=(vk==='inv')?state.inventory:state.sales;
      var it=arr.find(function(x){return x.id===vid;});
      if(it) showInvoice(vk==='sale'?saleShownInvoice(it):it.invoice);
      break;
    }
    case 'remove-logo': {
      var rn=t.getAttribute('data-name');
      state.marketplaces=state.marketplaces.map(function(m){ return m.name===rn?Object.assign({},m,{logo:null}):m; });
      persist(); render(); break;
    }
    case 'tax-month': {
      var mi=t.getAttribute('data-m');
      taxExpanded[mi]=!taxExpanded[mi];
      render();
      break;
    }
    case 'tax-sort': {
      var tk=t.getAttribute('data-key');
      if(taxDetailSort.key===tk) taxDetailSort.dir=taxDetailSort.dir==='asc'?'desc':'asc';
      else { taxDetailSort.key=tk; taxDetailSort.dir=(tk==='productName'||tk==='channel')?'asc':'desc'; }
      render();
      break;
    }
  }
}

function onSubmit(e){
  var f=e.target.closest('form[data-form]'); if(!f) return;
  e.preventDefault();
  if(f.getAttribute('data-form')==='inv') submitInv();
  else if(f.getAttribute('data-form')==='sale') submitSale();
}

function onInput(e){
  var el=e.target.closest('[data-live]'); if(!el) return;
  var k=el.getAttribute('data-live');
  if(k==='inv-search'){ invFilters.search=el.value; invPage=1; updateInvTable(); }
  else if(k==='sale-search'){ salesFilters.search=el.value; salesPage=1; updateSalesTable(); }
  else if(k==='set-bizname'){
    state.settings.businessName=el.value; persist();
    var h=document.getElementById('hdBiz');
    if(h) h.innerHTML=esc(el.value)+' · Handphone &amp; Elektronik';
  }
  else if(k==='combo-search'){ comboFilter(el); }
}

function onChange(e){
  var el=e.target.closest('[data-live]'); if(!el) return;
  var k=el.getAttribute('data-live');
  switch(k){
    case 'inv-onlyavail': invFilters.onlyAvail=el.checked; invPage=1; updateInvTable(); break;
    case 'inv-category': invFilters.category=el.value; invPage=1; updateInvTable(); break;
    case 'inv-pagesize': invPageSize=Number(el.value)||10; invPage=1; updateInvTable(); break;
    case 'sale-channel-filter': salesFilters.channel=el.value; salesPage=1; updateSalesTable(); break;
    case 'sale-category-filter': salesFilters.category=el.value; salesPage=1; updateSalesTable(); break;
    case 'sale-pagesize': salesPageSize=Number(el.value)||10; salesPage=1; updateSalesTable(); break;
    case 'inv-sort-select': { var isp=el.value.split(':'); invSort={key:isp[0],dir:isp[1]||'desc'}; invPage=1; render(); break; }
    case 'sale-sort-select': { var ssp=el.value.split(':'); salesSort={key:ssp[0],dir:ssp[1]||'desc'}; salesPage=1; render(); break; }
    case 'sale-channel': {
      var fee=getMarketplaceFee(el.value,state.marketplaces);
      var lab=document.getElementById('feeLabel');
      if(lab) lab.textContent='Biaya admin (default '+fee+'%)';
      break;
    }
    case 'sale-invpick': {
      var idx=el.getAttribute('data-idx')||'';
      var inv=state.inventory.find(function(i){return i.id===el.value;});
      var p=document.getElementById('saleProduct'+idx);
      if(inv && p) p.value=inv.productName;
      break;
    }
    case 'tax-year': taxYear=Number(el.value); render(); break;
    case 'tax-pkp': state.settings.isPkp=el.checked; persist(); render(); break;
    case 'set-pkp': state.settings.isPkp=el.checked; persist(); break;
    case 'fee': {
      var nm=el.getAttribute('data-name');
      state.marketplaces=state.marketplaces.map(function(m){ return m.name===nm ? Object.assign({},m,{fee:Number(el.value)||0}) : m; });
      persist(); break;
    }
    case 'color': {
      var nm2=el.getAttribute('data-name');
      state.marketplaces=state.marketplaces.map(function(m){ return m.name===nm2 ? Object.assign({},m,{color:el.value}) : m; });
      persist(); break;
    }
    case 'channel-logo': {
      var lm=el.getAttribute('data-name');
      var lf=el.files&&el.files[0]; if(!lf) break;
      if(lf.size>800000){ uiAlert('Ukuran logo maksimal ~800 KB. Pakai gambar lebih kecil.'); el.value=''; break; }
      fileToDataURL(lf,function(d){ if(!d){ uiAlert('Gagal membaca gambar.'); return; }
        state.marketplaces=state.marketplaces.map(function(m){ return m.name===lm?Object.assign({},m,{logo:d}):m; });
        __saveErr=null; persist(); if(__saveErr && !cloudMode){ uiAlert('Penyimpanan penuh — logo tidak tersimpan. Coba gambar lebih kecil.'); } render();
      });
      break;
    }
    case 'inv-invoice-file': {
      var f2=el.files&&el.files[0]; if(!f2) break;
      if(f2.size>3000000){ uiAlert('Ukuran file maksimal ~3 MB.'); el.value=''; break; }
      fileToDataURL(f2,function(d){ if(!d){ uiAlert('Gagal membaca file.'); return; } invInvoicePending={name:f2.name,type:f2.type,data:d};
        var s1=document.getElementById('invInvoiceStatus'); if(s1) s1.textContent='Dipilih: '+f2.name; });
      break;
    }
    case 'sale-invoice-file': {
      var f3=el.files&&el.files[0]; if(!f3) break;
      if(f3.size>3000000){ uiAlert('Ukuran file maksimal ~3 MB.'); el.value=''; break; }
      fileToDataURL(f3,function(d){ if(!d){ uiAlert('Gagal membaca file.'); return; } saleInvoicePending={name:f3.name,type:f3.type,data:d};
        var s2=document.getElementById('saleInvoiceStatus'); if(s2) s2.textContent='Dipilih: '+f3.name; });
      break;
    }
    case 'restore-backup-file': importBackup(e); break;
    case 'import-file': importFile(e); break;
  }
}

/* ═══════════════════════ SUPABASE CLOUD SYNC ═══════════════════════ */
var SUPABASE_URL = '';
var SUPABASE_ANON_KEY = '';
var sb = null, cloudMode = false, __cloudTimer = null, __cloudStatus = '';

function getSbUrl(){ try{ return SUPABASE_URL || localStorage.getItem('sb_url') || ''; }catch(e){ return SUPABASE_URL; } }
function getSbKey(){ try{ return SUPABASE_ANON_KEY || localStorage.getItem('sb_key') || ''; }catch(e){ return SUPABASE_ANON_KEY; } }
function getSbSkip(){ try{ return localStorage.getItem('sb_skip')==='1'; }catch(e){ return false; } }
function setSbSkip(v){ try{ if(v) localStorage.setItem('sb_skip','1'); else localStorage.removeItem('sb_skip'); }catch(e){} }

function normalizeSbUrl(raw){
  var u=(raw||'').trim();
  if(!u) return '';
  var m=u.match(/supabase\.com\/dashboard\/project\/([a-z0-9]+)/i);
  if(m) return 'https://'+m[1]+'.supabase.co';
  if(!/^https?:\/\//i.test(u)) u='https://'+u;
  var parts=u.split('/');
  if(parts.length>=3 && parts[2]) return parts[0]+'//'+parts[2];
  return u.replace(/\/+$/,'');
}
function initSb(){
  var url=getSbUrl(), key=getSbKey();
  if(!url || !key) return false;
  if(typeof window==='undefined' || typeof window.supabase==='undefined' || !window.supabase.createClient) return false;
  try{ if(!sb) sb=window.supabase.createClient(url,key); return !!sb; }catch(e){ return false; }
}

function currentBlob(){
  return { inventory:state.inventory, sales:state.sales, marketplaces:state.marketplaces,
    categories:state.categories, warranties:state.warranties, conditions:state.conditions, settings:state.settings };
}
function applyBlob(d){
  if(!d) return;
  if(Array.isArray(d.inventory)) state.inventory=d.inventory;
  if(Array.isArray(d.sales)) state.sales=d.sales;
  if(Array.isArray(d.marketplaces)) state.marketplaces=d.marketplaces;
  if(Array.isArray(d.categories)) state.categories=d.categories;
  if(Array.isArray(d.warranties)) state.warranties=d.warranties;
  if(Array.isArray(d.conditions)) state.conditions=d.conditions;
  if(d.settings) state.settings=d.settings;
}
function cloudLoad(){
  return sb.auth.getUser().then(function(r){
    var u=r.data&&r.data.user; if(!u) return null;
    return sb.from('app_data').select('data').eq('user_id',u.id).maybeSingle().then(function(res){
      if(res.error) throw res.error;
      return res.data ? res.data.data : null;
    });
  });
}
function cloudSave(dataObj){
  return sb.auth.getUser().then(function(r){
    var u=r.data&&r.data.user; if(!u) return;
    return sb.from('app_data').upsert({ user_id:u.id, data:dataObj, updated_at:new Date().toISOString() }).then(function(res){
      if(res.error) throw res.error;
    });
  });
}
function scheduleCloudSave(){
  setCloudStatus('saving');
  if(__cloudTimer) clearTimeout(__cloudTimer);
  __cloudTimer=setTimeout(function(){ __cloudTimer=null; doCloudSave(); }, 900);
}
function doCloudSave(){
  return cloudSave(currentBlob()).then(function(){ setCloudStatus('synced'); }).catch(function(e){ setCloudStatus('error'); if(typeof console!=='undefined') console.warn('cloud save',e); });
}
function flushThen(cb){
  if(__cloudTimer){ clearTimeout(__cloudTimer); __cloudTimer=null; doCloudSave().then(cb,cb); }
  else cb();
}
function setCloudStatus(s){ __cloudStatus=s; var el=document.getElementById('cloudBadge'); if(el) el.innerHTML=cloudBadgeInner(); }
function cloudBadgeInner(){
  if(!cloudMode) return '';
  var map={ loading:'memuat…', saving:'menyimpan…', synced:'tersinkron', error:'gagal sinkron' };
  var col={ loading:'var(--muted)', saving:'var(--warn)', synced:'var(--profit)', error:'var(--danger)' };
  return '<span class="cloud-dot" style="background:'+(col[__cloudStatus]||'var(--muted)')+'"></span>'+(map[__cloudStatus]||'cloud');
}
function sbSignIn(email,pw){ return sb.auth.signInWithPassword({email:email,password:pw}); }
function sbSignUp(email,pw){ return sb.auth.signUp({email:email,password:pw}); }
function authErrHint(m){
  m=m||'Gagal.';
  if(/invalid path|failed to fetch|networkerror|load failed|to fetch|invalid url|not found/i.test(m))
    m+=' — kemungkinan Project URL / anon key salah. Klik "Ganti koneksi Supabase" lalu salin ulang dari Supabase: Project Settings → API.';
  return m;
}

function renderGate(inner){
  try{ document.getElementById('nav').innerHTML=''; }catch(e){}
  try{ document.getElementById('hd').innerHTML='<div><h1 class="display">Stock &amp; Sales Tracker</h1><p class="eyebrow" style="margin:8px 0 0">Sinkronisasi Cloud</p></div>'; }catch(e){}
  document.getElementById('main').innerHTML='<div style="max-width:460px;margin:24px auto">'+inner+'</div>';
}
function renderLoadingScreen(msg){ renderGate('<div class="card"><p class="sm" style="margin:0">'+esc(msg||'Memuat…')+'</p></div>'); }
function sqlSetupText(){
  return 'create table if not exists public.app_data (\n'
    + '  user_id uuid primary key references auth.users(id) on delete cascade,\n'
    + '  data jsonb not null default \'{}\'::jsonb,\n'
    + '  updated_at timestamptz not null default now()\n'
    + ');\n'
    + 'alter table public.app_data enable row level security;\n'
    + 'create policy "own_all" on public.app_data\n'
    + '  for all using (auth.uid() = user_id) with check (auth.uid() = user_id);';
}
function renderConfigScreen(err){
  renderGate(
    '<div class="card">'
    + '<h2 class="display" style="font-size:22px;margin:0 0 6px">Hubungkan ke Supabase</h2>'
    + '<p class="note" style="margin:0 0 16px">Agar data & invoice tersimpan di cloud dan bisa dibuka di HP/laptop mana pun. Ambil dari Supabase: <strong style="color:var(--ink)">Project Settings \u2192 API</strong>. Project URL harus berbentuk <strong style="color:var(--ink)">https://xxxx.supabase.co</strong> (bukan alamat halaman dashboard).</p>'
    + (err?'<div class="alert danger" style="margin:0 0 12px">'+esc(err)+'</div>':'')
    + '<label class="fld" style="margin-bottom:10px"><span>Project URL</span><input id="sbUrl" type="text" placeholder="https://xxxx.supabase.co" value="'+esc(getSbUrl())+'"></label>'
    + '<label class="fld" style="margin-bottom:14px"><span>anon public key</span><input id="sbKey" type="text" placeholder="eyJhbGciOi..." value="'+esc(getSbKey())+'"></label>'
    + '<div class="toolbar"><button class="btn btn-primary" data-action="sb-save-config">Simpan &amp; Lanjut</button>'
    + '<button class="btn btn-outline" data-action="sb-skip-local">Pakai mode lokal saja</button></div>'
    + '<div style="margin-top:14px"><button class="linkbtn" data-action="sb-toggle-sql">Lihat SQL setup (jalankan sekali di Supabase)</button>'
    + '<pre id="sbSql" style="display:none;white-space:pre-wrap;font-size:11px;background:var(--paper);border:1px solid var(--rule);border-radius:6px;padding:10px;margin-top:8px;overflow:auto">'+esc(sqlSetupText())+'</pre></div>'
    + '</div>');
}
function renderLoginScreen(err,info){
  renderGate(
    '<div class="card">'
    + '<h2 class="display" style="font-size:22px;margin:0 0 6px">Masuk</h2>'
    + '<p class="note" style="margin:0 0 16px">Ini <strong style="color:var(--ink)">akun baru khusus aplikasi ini</strong> (bukan akun login supabase.com). Pertama kali? Klik <strong style="color:var(--ink)">Daftar akun baru</strong> dulu, lalu Masuk.</p>'
    + (err?'<div class="alert danger" style="margin:0 0 12px">'+esc(err)+'</div>':'')
    + (info?'<div class="alert profit" style="margin:0 0 12px">'+esc(info)+'</div>':'')
    + '<label class="fld" style="margin-bottom:10px"><span>Email</span><input id="sbEmail" type="email" placeholder="kamu@email.com"></label>'
    + '<label class="fld" style="margin-bottom:14px"><span>Password</span><input id="sbPw" type="password" placeholder="min. 6 karakter"></label>'
    + '<div class="toolbar"><button class="btn btn-primary" data-action="sb-signin">Masuk</button>'
    + '<button class="btn btn-outline" data-action="sb-signup">Daftar akun baru</button></div>'
    + '<div style="margin-top:14px"><button class="linkbtn muted" data-action="sb-reconfigure">Ganti koneksi Supabase</button> \u00b7 <button class="linkbtn muted" data-action="sb-skip-local">Pakai mode lokal</button></div>'
    + '</div>');
}
function boot(){
  if(getSbSkip()){ cloudMode=false; render(); return; }
  var url=getSbUrl(), key=getSbKey();
  if(!url || !key){ renderConfigScreen(); return; }
  if(!initSb()){ renderConfigScreen('Library Supabase belum termuat (butuh internet). Muat ulang halaman, atau pakai mode lokal.'); return; }
  renderLoadingScreen('Menghubungkan\u2026');
  sb.auth.getSession().then(function(res){
    var session=res.data&&res.data.session;
    if(!session){ renderLoginScreen(); return; }
    enterCloud();
  }).catch(function(){ renderLoginScreen('Gagal memeriksa sesi. Coba masuk lagi.'); });
}
function renderSetupScreen(err){
  renderGate(
    '<div class="card">'
    + '<h2 class="display" style="font-size:22px;margin:0 0 6px">Satu langkah lagi: buat tabel database</h2>'
    + '<p class="note" style="margin:0 0 12px">Login berhasil, tapi tabel datanya belum ada di Supabase. Jalankan SQL ini <strong style="color:var(--ink)">sekali</strong>: di Supabase buka <strong style="color:var(--ink)">SQL Editor \u2192 New query</strong> \u2192 tempel \u2192 <strong style="color:var(--ink)">Run</strong>. Setelah itu tekan <strong style="color:var(--ink)">Coba lagi</strong>.</p>'
    + (err?'<div class="alert danger" style="margin:0 0 12px">'+esc(err)+'</div>':'')
    + '<pre style="white-space:pre-wrap;font-size:11px;background:var(--paper);border:1px solid var(--rule);border-radius:6px;padding:10px;margin:0 0 14px;overflow:auto">'+esc(sqlSetupText())+'</pre>'
    + '<div class="toolbar"><button class="btn btn-primary" data-action="sb-retry">Coba lagi</button>'
    + '<button class="btn btn-outline" data-action="sb-signout">Keluar</button></div>'
    + '</div>');
}
function enterCloud(){
  cloudMode=true; setCloudStatus('loading');
  renderLoadingScreen('Memuat data dari cloud\u2026');
  cloudLoad().then(function(d){
    if(d){ applyBlob(d); localPersist(); setCloudStatus('synced'); render(); }
    else { doCloudSave().then(function(){ render(); }); }
  }).catch(function(e){
    var msg=(e&&e.message)||String(e);
    if(/schema cache|could not find the table|relation .*app_data|does not exist|permission denied|row-level security|rls/i.test(msg)){
      renderSetupScreen('Pesan Supabase: '+msg);
    } else {
      renderLoginScreen(authErrHint('Gagal memuat data: '+msg));
    }
  });
}
function cloudSignOut(){
  if(!sb){ cloudMode=false; render(); return; }
  flushThen(function(){ sb.auth.signOut().then(function(){ cloudMode=false; renderLoginScreen(null,'Sudah keluar.'); },function(){ cloudMode=false; renderLoginScreen(null,'Sudah keluar.'); }); });
}
function cloudSyncNow(){
  if(!cloudMode) return;
  setCloudStatus('loading');
  flushThen(function(){
    cloudLoad().then(function(d){ if(d){ applyBlob(d); localPersist(); } setCloudStatus('synced'); render(); })
      .catch(function(e){ setCloudStatus('error'); uiAlert('Gagal sinkron: '+((e&&e.message)||e)); });
  });
}

/* ── Modal kustom (pengganti confirm/prompt/alert yang diblokir di dalam iframe/preview) ── */
var __modalCb=null;
function setupModal(){
  var mo=document.createElement('div'); mo.className='modal-ov'; mo.id='modalOverlay';
  mo.innerHTML='<div class="modal" role="dialog" aria-modal="true">'
    +'<h4 id="modalTitle"></h4><p id="modalMsg"></p>'
    +'<div id="modalInputWrap" style="display:none;margin-bottom:16px"><input id="modalInput" type="text"></div>'
    +'<div class="actions"><button type="button" class="btn btn-outline" id="modalCancel">Batal</button>'
    +'<button type="button" class="btn btn-primary" id="modalOk">OK</button></div></div>';
  document.body.appendChild(mo);
  document.getElementById('modalOk').addEventListener('click',function(){ var cb=__modalCb; closeModal(); if(cb) cb(); });
  document.getElementById('modalCancel').addEventListener('click',closeModal);
  mo.addEventListener('click',function(e){ if(e.target===mo) closeModal(); });
  document.getElementById('modalInput').addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); document.getElementById('modalOk').click(); } });
  document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeModal(); });
}
function openModal(o){
  document.getElementById('modalTitle').textContent=o.title||'';
  if(o.html!==undefined){ document.getElementById('modalMsg').innerHTML=o.html; } else { document.getElementById('modalMsg').textContent=o.msg||''; }
  var iw=document.getElementById('modalInputWrap'), inp=document.getElementById('modalInput');
  if(o.input){ iw.style.display='block'; inp.value=o.def||''; } else { iw.style.display='none'; }
  var cancel=document.getElementById('modalCancel'), ok=document.getElementById('modalOk');
  cancel.style.display=o.hideCancel?'none':'';
  ok.textContent=o.okText||'OK';
  ok.className='btn '+(o.danger?'btn-danger':'btn-primary');
  __modalCb=o.cb||null;
  document.getElementById('modalOverlay').classList.add('show');
  if(o.input) setTimeout(function(){ inp.focus(); inp.select(); },30);
}
function closeModal(){ var el=document.getElementById('modalOverlay'); if(el) el.classList.remove('show'); __modalCb=null; }
function uiConfirm(msg,cb,opts){ opts=opts||{}; openModal({title:opts.title||'Konfirmasi',msg:msg,okText:opts.okText||'Ya, lanjut',danger:opts.danger,cb:cb}); }
function uiPrompt(msg,def,cb){ openModal({title:'Input',msg:msg,input:true,def:def,okText:'Simpan',cb:function(){ cb(document.getElementById('modalInput').value); }}); }
function uiAlert(msg){ openModal({title:'Info',msg:msg,okText:'OK',hideCancel:true,cb:null}); }

document.addEventListener('click',onClick);
document.addEventListener('submit',onSubmit);
document.addEventListener('input',onInput);
document.addEventListener('change',onChange);
document.addEventListener('focusin',comboFocus);
document.addEventListener('click',comboOutside);
setupModal();

/* ── Import data dari Stock_Barang.xlsx (sekali-jalan, idempotent) ── */
if(!load('stock_seed_'+SEED_ID,false)){
  var __ch={}; state.marketplaces.forEach(function(m){ __ch[m.name]=true; });
  SEED_CHANNELS.forEach(function(c){ if(!__ch[c.name]) state.marketplaces.push(c); });
  var __iv={}; state.inventory.forEach(function(i){ __iv[i.id]=true; });
  var __addIv=SEED_INVENTORY.filter(function(i){ return !__iv[i.id]; });
  if(__addIv.length) state.inventory=__addIv.concat(state.inventory);
  var __sl={}; state.sales.forEach(function(s){ __sl[s.id]=true; });
  var __addSl=SEED_SALES.filter(function(s){ return !__sl[s.id]; });
  if(__addSl.length) state.sales=__addSl.concat(state.sales);
  save('stock_seed_'+SEED_ID,true);
  persist();
}

/* ── Hapus item non-Handphone dari data lama (sekali-jalan) ── */
if(!load('stock_cleanup_nonhp_1', false)){
  var __rm={};
  state.inventory.forEach(function(i){ if(i.category!=='Handphone') __rm[i.id]=true; });
  state.inventory = state.inventory.filter(function(i){ return i.category==='Handphone'; });
  state.sales = state.sales.filter(function(s){ return !(s.inventoryId && __rm[s.inventoryId]); });
  save('stock_cleanup_nonhp_1', true);
  persist();
}

/* ── Gabungkan channel "Setor" ke "Whatsapp" (sekali-jalan) ── */
if(!load('stock_merge_setor_1', false)){
  state.sales.forEach(function(s){ if(s.channel==='Setor') s.channel='Whatsapp'; });
  state.marketplaces=state.marketplaces.filter(function(m){ return m.name!=='Setor'; });
  if(salesFilters.channel==='Setor') salesFilters.channel='all';
  save('stock_merge_setor_1', true);
  persist();
}

boot();
